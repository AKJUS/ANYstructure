name: Tests

on:
  push:
    branches:
      - modern_dev
  pull_request:
    branches:
      - modern_dev

jobs:
  pytest:
    name: Python tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Import package
        run: python -c "import anystruct; print('anystruct import OK')"

      - name: Run pytest
        run: python -m pytest

      - name: Run GUI smoke on Windows
        if: runner.os == 'Windows'
        run: python -m tests.gui_automatic_run

      - name: Run GUI smoke on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m tests.gui_automatic_run
